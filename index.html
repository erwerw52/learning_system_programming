<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System &amp; Programming 考前複習</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --tab-h: 52px;
    --header-h: 72px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding-top: var(--header-h); }

  .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 150; background: var(--primary); color: white; padding: 16px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .site-header h1 { font-size: 1.25rem; font-weight: 700; }
  .site-header p { font-size: .85rem; opacity: .8; margin-top: 2px; }

  .tab-bar { position: sticky; top: var(--header-h); z-index: 100; background: var(--surface); border-bottom: 2px solid var(--border); display: flex; overflow-x: auto; }
  .tab-btn {
    flex: 1; min-width: 120px; height: var(--tab-h); border: none; background: none;
    cursor: pointer; font-size: .9rem; font-weight: 600; color: var(--text-muted);
    border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; padding: 0 20px;
  }
  .tab-btn:hover { color: var(--primary); background: var(--primary-light); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .tab-pane { display: none; max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }
  .tab-pane.active { display: block; }


  .loading { text-align: center; padding: 60px 0; color: var(--text-muted); }
  .error-msg { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: 16px 20px; border-radius: 8px; margin: 20px 0; font-size: .9rem; line-height: 1.8; }
  .error-msg code { background: #fee2e2; padding: 2px 6px; border-radius: 4px; }

  .md-body h1 { font-size: 1.75rem; font-weight: 800; margin: 0 0 20px; color: var(--primary); border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; scroll-margin-top: 136px; }
  .md-body h2 { font-size: 1.3rem; font-weight: 700; margin: 36px 0 14px; color: #1e40af; border-left: 4px solid var(--primary); padding-left: 12px; scroll-margin-top: 136px; }
  .md-body h3 { font-size: 1.05rem; font-weight: 700; margin: 24px 0 10px; color: #334155; scroll-margin-top: 136px; }
  .md-body h4 { font-size: .95rem; font-weight: 700; margin: 18px 0 8px; color: #475569; scroll-margin-top: 136px; }
  .md-body p { margin: 10px 0; }
  .md-body ul, .md-body ol { padding-left: 22px; margin: 8px 0; }
  .md-body li { margin: 4px 0; }
  .md-body blockquote { border-left: 4px solid #f59e0b; background: #fffbeb; padding: 10px 16px; margin: 12px 0; border-radius: 0 6px 6px 0; font-size: .9rem; color: #92400e; }
  .md-body hr { border: none; border-top: 2px solid var(--border); margin: 28px 0; }
  .md-body code:not(pre code) { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: .85em; font-family: "Fira Code", "Cascadia Code", monospace; color: #be185d; }
  .md-body pre { background: #1e293b; border-radius: 8px; padding: 16px; overflow-x: auto; margin: 14px 0; }
  .md-body pre code { background: none; color: #e2e8f0; font-size: .84rem; font-family: "Fira Code", "Cascadia Code", monospace; padding: 0; }
  .md-body table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: .88rem; }
  .md-body table th { background: #1e40af; color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
  .md-body table td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
  .md-body table tr:nth-child(even) td { background: var(--primary-light); }
  .md-body table tr:hover td { background: #bfdbfe; }
  .md-body strong { color: #0f172a; }
  .md-body a { color: var(--primary); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }

  .hot-section { background: linear-gradient(135deg, #fff7ed, #fef3c7); border: 1px solid #fcd34d; border-radius: 10px; padding: 20px 24px; margin: 24px 0; }
  .hot-section h1, .hot-section h2 { color: #92400e !important; border-color: #f59e0b !important; }

  .back-top { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; background: var(--primary); color: white; border: none; border-radius: 50%; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,.4); display: none; align-items: center; justify-content: center; }
  .back-top.show { display: flex; }
  .back-top:hover { background: #1d4ed8; }

  /* ── Hamburger button（桌面隱藏） ─────────────────────────── */
  .hamburger { display: none; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(255,255,255,.15); border: none; border-radius: 8px; color: white; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; }
  .hamburger:hover { background: rgba(255,255,255,.25); }

  /* ── Drawer overlay ───────────────────────────────────────── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  /* ── Drawer ───────────────────────────────────────────────── */
  .drawer { position: fixed; top: 0; right: 0; width: 260px; height: 100dvh; background: var(--surface); z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s ease; box-shadow: -4px 0 20px rgba(0,0,0,.15); }
  .drawer.open { transform: translateX(0); }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--primary); color: white; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
  .drawer-close { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 4px; border-radius: 4px; }
  .drawer-close:hover { background: rgba(255,255,255,.2); }
  .drawer-list { list-style: none; padding: 10px 0; overflow-y: auto; flex: 1; }
  .drawer-list li button { width: 100%; text-align: left; padding: 13px 20px; background: none; border: none; cursor: pointer; font-size: .92rem; font-weight: 500; color: var(--text); border-left: 4px solid transparent; transition: all .15s; }
  .drawer-list li button:hover { background: var(--primary-light); color: var(--primary); }
  .drawer-list li button.active { color: var(--primary); border-left-color: var(--primary); background: var(--primary-light); font-weight: 700; }

  /* ── RWD：手機版 ──────────────────────────────────────────── */
  @media (max-width: 768px) {
    .site-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-text { flex: 1; min-width: 0; }
    .hamburger { display: flex; }
    .tab-bar { display: none; }
    .tab-pane { padding: 24px 16px 80px; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 { scroll-margin-top: 88px; }
  }
</style>
</head>
<body>

<div class="site-header">
  <div class="header-text">
    <h1>📚 System &amp; Programming 考前複習</h1>
    <p id="headerSubtitle">Assembly Language — CH1~CH5</p>
  </div>
  <button class="hamburger" id="hamburgerBtn" aria-label="開啟選單">☰</button>
</div>

<!-- 遮罩 -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- 側拉選單 -->
<nav class="drawer" id="drawer">
  <div class="drawer-header">
    <span>章節目錄</span>
    <button class="drawer-close" id="drawerClose" aria-label="關閉選單">✕</button>
  </div>
  <ul class="drawer-list" id="drawerList"></ul>
</nav>

<div class="tab-bar" id="tabBar"></div>


<div id="tabContent"></div>

<button class="back-top" id="backTop" onclick="window.scrollTo(0,0)">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
<script>
// ── 章節設定：新增章節只需在這裡加一行 ──────────────────────
const CHAPTERS = [
  { title: 'CH1 Basic Concepts',  file: 'textbooks/c1_basic_concepts_notes.md' },
  { title: 'CH2 AL Fundamentals', file: 'textbooks/c2_assembly_language_fundamentals_notes.md' },
  { title: 'CH3 Data Transfers',  file: 'textbooks/c3_data_transfers_addressing_arithmetic_notes.md' },
  { title: 'CH4 Procedures',      file: 'textbooks/c4_procedures_notes.md' },
  { title: 'CH5 Conditional Processing',      file: 'textbooks/c5_conditional_processing_notes.md' },
];

// ── markdown-it 設定 ─────────────────────────────────────────
const mdParser = window.markdownit({ html: false, linkify: false, typographer: false });

function githubSlugify(str) {
  // CJK Unified Ideographs: 一-鿿 + Extension A: 㐀-䶿
  const cjk = '\\u4e00-\\u9fff\\u3400-\\u4dbf';
  return str
    .replace(new RegExp('（[' + cjk + '\\s]+）', 'g'), '')  // 括號內純中文 → 整段移除
    .replace(/[（）]/g, '')                                   // 剩餘全形括號符號移除（保留內容）
    .toLowerCase()
    .replace(new RegExp('[^\\w' + cjk + '\\s-]', 'g'), '')  // 移除標點、emoji 等雜訊
    .replace(/\s+/g, '-')
    .replace(/^-+|-+$/g, '');                                // 去掉頭尾多餘的 -
}

mdParser.renderer.rules.heading_open = function(tokens, idx, options, env, self) {
  const titleToken = tokens[idx + 1];
  const title = titleToken.children.map(t => t.content).join('');
  tokens[idx].attrSet('id', githubSlugify(title));
  return self.renderToken(tokens, idx, options);
};

// ── 建立 tab 骨架 + drawer 清單 ───────────────────────────────
const tabBar     = document.getElementById('tabBar');
const tabContent = document.getElementById('tabContent');
const drawerList = document.getElementById('drawerList');

CHAPTERS.forEach((ch, i) => {
  // Desktop tab
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = ch.title;
  btn.addEventListener('click', () => switchTab(i));
  tabBar.appendChild(btn);

  // Mobile drawer item
  const li  = document.createElement('li');
  const dBtn = document.createElement('button');
  dBtn.className = i === 0 ? 'active' : '';
  dBtn.textContent = ch.title;
  dBtn.addEventListener('click', () => switchTab(i));
  li.appendChild(dBtn);
  drawerList.appendChild(li);

  // Content pane
  const pane = document.createElement('div');
  pane.className = 'tab-pane' + (i === 0 ? ' active' : '');
  pane.id = `pane-${i}`;
  pane.innerHTML = '<div class="loading">載入中…</div>';
  tabContent.appendChild(pane);
});

// ── Drawer 開關 ────────────────────────────────────────────────
const drawer        = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');

function openMenu() {
  drawer.classList.add('open');
  drawerOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMenu() {
  drawer.classList.remove('open');
  drawerOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('hamburgerBtn').addEventListener('click', openMenu);
document.getElementById('drawerClose').addEventListener('click', closeMenu);
drawerOverlay.addEventListener('click', closeMenu);

// ── Header 副標題（手機：顯示目前章節，桌面：固定文字） ────────
function updateHeaderSubtitle(idx) {
  const el = document.getElementById('headerSubtitle');
  el.textContent = window.innerWidth <= 768
    ? CHAPTERS[idx].title
    : 'Assembly Language — CH1~CH5';
}

window.addEventListener('resize', () => {
  // 視窗放大超過斷點時還原副標題並關閉選單
  const currentIdx = [...document.querySelectorAll('.tab-btn')].findIndex(b => b.classList.contains('active'));
  updateHeaderSubtitle(currentIdx >= 0 ? currentIdx : 0);
  if (window.innerWidth > 768) closeMenu();
});

// ── fetch + 渲染 ──────────────────────────────────────────────
async function loadChapter(idx) {
  const pane = document.getElementById(`pane-${idx}`);
  if (pane.dataset.loaded) return;

  try {
    const res = await fetch(CHAPTERS[idx].file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    renderMarkdown(pane, md);
    pane.dataset.loaded = '1';
  } catch (err) {
    pane.innerHTML = `
      <div class="error-msg">
        <strong>無法載入：</strong><code>${CHAPTERS[idx].file}</code><br><br>
        請透過 HTTP server 開啟此頁面：<br>
        <code>npx serve .</code> 或 VS Code Live Server<br><br>
        錯誤：${err.message}
      </div>`;
  }
}

function renderMarkdown(pane, md) {
  const body = document.createElement('div');
  body.className = 'md-body';

  const hotIdx = md.indexOf('# 🔥 速背重點整理');
  if (hotIdx !== -1) {
    body.innerHTML = mdParser.render(md.substring(0, hotIdx));
    const hotDiv = document.createElement('div');
    hotDiv.className = 'hot-section';
    hotDiv.innerHTML = mdParser.render(md.substring(hotIdx));
    body.appendChild(hotDiv);
  } else {
    body.innerHTML = mdParser.render(md);
  }

  pane.innerHTML = '';
  pane.appendChild(body);
  pane.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  bindAnchorLinks(pane);
}

// ── 錨點連結攔截：限定在當前 active pane 內搜尋，解決跨章節重複 ID 問題 ──
function bindAnchorLinks(pane) {
  pane.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', function(e) {
      // markdown-it 可能對 href 做 URL encode，先 decode 回原始字串
      const hash = decodeURIComponent(this.getAttribute('href').slice(1));
      const activePane = document.querySelector('.tab-pane.active');
      const target = activePane.querySelector('[id="' + CSS.escape(hash) + '"]');
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    });
  });
}

// ── tab 切換 ──────────────────────────────────────────────────
function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === idx));
  // 同步更新 drawer 清單的 active 狀態
  document.querySelectorAll('.drawer-list li button').forEach((b, i) => b.classList.toggle('active', i === idx));
  window.scrollTo(0, 0);
  closeMenu();
  updateHeaderSubtitle(idx);
  loadChapter(idx);
}

// ── 回到頂部 ──────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 300);
});

// ── 初始載入 ──────────────────────────────────────────────────
loadChapter(0);
</script>
</body>
</html>
